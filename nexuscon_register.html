<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NexusCon 2025 — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&family=Roboto+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--black:#060608;--dark:#0e0e12;--card:#14141a;--white:#fff;--green:#00e676;--blue:#2979ff;--green-dark:#00b248;--blue-dark:#1a52cc;--gray:#252530;--muted:#8888aa;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Roboto',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden;min-height:100vh;}
nav{position:fixed;top:0;width:100%;z-index:900;background:rgba(6,6,8,0.9);backdrop-filter:blur(20px);border-bottom:2px solid var(--green);display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:76px;flex-wrap: wrap;}
.nav-logo{font-family:'Roboto Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--white);letter-spacing:3px;text-decoration:none;}.nav-logo span{color:var(--green);}
.nav-links{display:flex;gap:8px;align-items:center;display: block !important;}
.nav-links a{color:var(--white);text-decoration:none;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border-radius:4px;transition:background .2s;}
.nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,0.1);}
.btn-blue{background:var(--blue);color:var(--white)!important;border:none;padding:18px 44px;font-size:20px;font-family:'Roboto',sans-serif;font-weight:700;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-block;letter-spacing:1px;transition:background .2s,transform .15s,box-shadow .2s;}
.btn-blue:hover{background:var(--blue-dark);transform:translateY(-3px);box-shadow:0 12px 40px rgba(41,121,255,0.45);}
.btn-green{background:var(--green);color:var(--white)!important;border:none;padding:18px 44px;font-size:20px;font-family:'Roboto',sans-serif;font-weight:700;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-block;letter-spacing:1px;transition:background .2s,transform .15s,box-shadow .2s;}
.btn-green:hover{background:var(--green-dark);transform:translateY(-3px);}
.nav-btn{padding:10px 22px!important;font-size:14px!important;}
.reveal{opacity:0;transform:translateY(40px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1);}
.reveal.visible{opacity:1;transform:translateY(0);}
/* REGISTER HERO */
#reg-hero{min-height:50vh;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:160px 48px 70px;}
.rh-slides{position:absolute;inset:0;}
.rh-slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 2s;}
.rh-slide.active{opacity:1;}
.rh-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(6,6,8,0.92) 0%,rgba(6,6,8,0.55) 70%,transparent 100%),linear-gradient(to top,rgba(6,6,8,1) 0%,transparent 60%);}
.rh-content{position:relative;z-index:2;max-width:700px;}
.eyebrow{font-size:16px;letter-spacing:5px;text-transform:uppercase;font-weight:700;margin-bottom:16px;display:block;}
.eyebrow.g{color:var(--green);}
.rh-title{font-family:'Roboto Condensed',sans-serif;font-size:clamp(54px,9vw,120px);font-weight:900;color:var(--white);line-height:0.9;letter-spacing:-3px;margin-bottom:16px;text-shadow:0 4px 40px rgba(0,0,0,0.9);}
.rh-desc{font-size:clamp(17px,2vw,22px);color:rgba(255,255,255,0.7);line-height:1.7;}
/* FORM SECTION */
#reg-form-section{position:relative;padding:90px 24px;overflow:hidden;}
.rf-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-attachment:fixed;}
.rf-bg::after{content:'';position:absolute;inset:0;background:rgba(6,6,8,0.92);}
.rf-inner{position:relative;z-index:2;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1.2fr;gap:60px;align-items:start;}
/* TICKET CARDS */
.ticket-col{}
.ticket-sec-title{font-family:'Roboto Condensed',sans-serif;font-size:clamp(32px,4vw,52px);font-weight:900;color:var(--white);margin-bottom:10px;line-height:1;}
.ticket-sec-desc{font-size:18px;color:var(--muted);margin-bottom:36px;line-height:1.7;}
.ticket-cards{display:flex;flex-direction:column;gap:16px;}
.ticket-card{background:rgba(20,20,26,0.95);border:2px solid var(--gray);border-radius:16px;padding:28px 30px;cursor:pointer;transition:border-color .2s,transform .2s;position:relative;}
.ticket-card:hover,.ticket-card.selected{border-color:var(--blue);transform:translateX(4px);}
.ticket-card.selected{background:rgba(41,121,255,0.08);}
.ticket-card.featured{border-color:var(--green);}
.ticket-card.featured:hover,.ticket-card.featured.selected{border-color:var(--green);background:rgba(0,230,118,0.08);}
.ticket-best{position:absolute;top:-12px;right:20px;background:var(--green);color:var(--black);font-size:11px;font-weight:900;letter-spacing:2px;padding:4px 14px;border-radius:12px;text-transform:uppercase;}
.ticket-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ticket-name{font-family:'Roboto Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--white);}
.ticket-price{font-family:'Roboto Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--white);}
.ticket-price span{font-size:18px;font-weight:400;color:var(--muted);}
.ticket-perks{font-size:15px;color:var(--muted);line-height:1.8;}
.ticket-select{display:flex;align-items:center;gap:10px;margin-top:14px;}
.t-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--gray);flex-shrink:0;transition:border-color .2s,background .2s;}
.ticket-card.selected .t-radio{border-color:var(--blue);background:var(--blue);}
.ticket-card.featured.selected .t-radio{border-color:var(--green);background:var(--green);}
.t-label{font-size:15px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
/* FORM */
.form-col{}
.form-box{background:rgba(20,20,26,0.97);border:1px solid var(--gray);border-radius:20px;padding:44px 40px;}
.form-title{font-family:'Roboto Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--white);margin-bottom:8px;}
.form-subtitle{font-size:17px;color:var(--muted);margin-bottom:34px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;background:rgba(255,255,255,0.06);border:2px solid var(--gray);border-radius:8px;padding:14px 18px;color:var(--white);font-size:17px;font-family:'Roboto',sans-serif;transition:border-color .2s,background .2s;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);background:rgba(41,121,255,0.06);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted);}
.form-select{cursor:pointer;}
.form-select option{background:var(--dark);color:var(--white);}
.form-textarea{min-height:100px;resize:vertical;}
.form-check{display:flex;gap:12px;align-items:flex-start;margin-bottom:20px;}
.form-check input{width:20px;height:20px;margin-top:2px;accent-color:var(--blue);flex-shrink:0;}
.form-check label{font-size:16px;color:var(--muted);line-height:1.6;}
.form-check label a{color:var(--green);text-decoration:none;}
.submit-btn{width:100%;padding:20px;font-size:22px;border-radius:8px;font-weight:900;letter-spacing:2px;border:none;cursor:pointer;background:var(--blue);color:var(--white);transition:background .2s,transform .15s,box-shadow .2s;font-family:'Roboto Condensed',sans-serif;}
.submit-btn:hover{background:var(--blue-dark);transform:translateY(-2px);box-shadow:0 12px 40px rgba(41,121,255,0.45);}
/* SUCCESS */
#success-screen{display:none;text-align:center;padding:80px 24px;position:relative;z-index:2;}
.success-icon{font-size:100px;margin-bottom:24px;display:block;animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-family:'Roboto Condensed',sans-serif;font-size:clamp(44px,6vw,80px);font-weight:900;color:var(--white);margin-bottom:16px;}
.success-title span{color:var(--green);}
.success-desc{font-size:22px;color:var(--muted);max-width:600px;margin:0 auto 40px;line-height:1.8;}
/* PERKS */
#perks{position:relative;padding:90px 24px;overflow:hidden;}
.perks-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.perks-bg::after{content:'';position:absolute;inset:0;background:rgba(6,6,8,0.89);}
.perks-inner{position:relative;z-index:2;max-width:1200px;margin:0 auto;}
.perks-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:24px;margin-top:56px;}
.perk-card{background:rgba(20,20,26,0.9);border:1px solid var(--gray);border-radius:16px;padding:32px;border-left:4px solid var(--green);}
.perk-icon{font-size:44px;margin-bottom:14px;}
.perk-title{font-family:'Roboto Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--white);margin-bottom:10px;}
.perk-text{font-size:17px;color:rgba(255,255,255,0.6);line-height:1.8;}
footer{position:relative;overflow:hidden;padding:60px 24px 40px;}
.footer-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.footer-bg::after{content:'';position:absolute;inset:0;background:rgba(6,6,8,0.96);}
.footer-content{position:relative;z-index:2;max-width:1200px;margin:0 auto;}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;padding-top:28px;border-top:1px solid var(--gray);}
.footer-copy{color:var(--muted);font-size:15px;}
.footer-nav a{color:var(--muted);text-decoration:none;font-size:15px;margin-left:20px;transition:color .2s;}
.footer-nav a:hover{color:var(--green);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--black);}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;}
@media(max-width:900px){.rf-inner{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}}
@media(max-width:768px){nav{padding:0 20px;}.nav-links{display:none;}#reg-hero{padding:140px 24px 60px;}}
</style>
</head>
<body>
<nav id="main-nav">
  <a class="nav-logo" href="index.html">NEXUS<span>CON</span></a>
  <div class="nav-links">
    <a href="./index.html">Home</a>
    <a href="./nexuscon_comics.html">Comics</a>
    <a href="./nexuscon_gallery.html">Gallery</a>
    <a href="./nexuscon_board.html">Board</a>
    

  </div>
</nav>

<section id="reg-hero">
  <div class="rh-slides" id="rhSlides"></div>
  <div class="rh-content">
    <span class="eyebrow g">🎟️ Join Us</span>
    <h1 class="rh-title">Register<br>For <span style="color:var(--green)">NexusCon</span><br>2025</h1>
    <p class="rh-desc">Secure your place at the greatest comic con on Earth. March 20th, 2026 · Umat Mini Auditorium.</p><br>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSca4vson5iGjQZ8HDY1PYV9_XjPK2Z_lZW0LIpm8kqmTbAPyA/viewform?usp=publish-editor" class="submit-btn">Register Now</a>
  </div>
</section>

<section id="reg-form-section">
  <div class="rf-bg" style="background-image:url('https://images.unsplash.com/photo-1509347528160-9a9e33742cdb?w=1800&q=80')"></div>
  <div class="rf-inner">

    
  </div>
</section>





<script>
window.addEventListener('scroll',()=>{document.getElementById('main-nav').style.background=window.scrollY>80?'rgba(6,6,8,0.97)':'rgba(6,6,8,0.9)';});
const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible');}),{threshold:.08,rootMargin:'0px 0px -50px 0px'});
document.querySelectorAll('.reveal').forEach((el,i)=>{el.style.transitionDelay=(i%8)*.07+'s';obs.observe(el);});
// Hero slideshow
const rhs=['https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?w=1800&q=80','https://images.unsplash.com/photo-1588497859490-85d1c17db96d?w=1800&q=80','https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1800&q=80'];
const sc=document.getElementById('rhSlides');
rhs.forEach((s,i)=>{const d=document.createElement('div');d.className='rh-slide'+(i===0?' active':'');d.style.backgroundImage=`url('${s}')`;sc.appendChild(d);});
let ci=0;setInterval(()=>{const all=sc.querySelectorAll('.rh-slide');all[ci].classList.remove('active');ci=(ci+1)%all.length;all[ci].classList.add('active');},5000);
// Ticket selection
function selectTicket(card,type){
  document.querySelectorAll('.ticket-card').forEach(c=>{c.classList.remove('selected');c.querySelector('.t-radio').style.background='';c.querySelector('.t-radio').style.borderColor='';c.querySelector('.t-label').textContent='Select';});
  card.classList.add('selected');
  const r=card.querySelector('.t-radio');
  if(card.classList.contains('featured')){r.style.borderColor='var(--green)';r.style.background='var(--green)';}
  else{r.style.borderColor='var(--blue)';r.style.background='var(--blue)';}
  card.querySelector('.t-label').textContent='Selected ✓';
}
// Form submit
function handleSubmit(e){
  e.preventDefault();
  const form=document.getElementById('reg-form');
  const fname=form.querySelector('input[type="text"]').value;
  const email=form.querySelector('input[type="email"]').value;
  const terms=form.querySelector('#terms').checked;
  if(!fname||!email||!terms){
    alert('Please fill in all required fields and accept the Terms & Conditions.');
    return;
  }
  document.getElementById('reg-form-box').style.display='none';
  document.getElementById('success-screen').style.display='block';
  window.scrollTo({top:document.getElementById('reg-form-section').offsetTop-80,behavior:'smooth'});
}
</script>
</body>
</html>
